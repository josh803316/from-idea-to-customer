# Fly.io configuration for fitc-api
# Docs: https://fly.io/docs/reference/configuration/

app            = "fitc-api"
primary_region = "iad"

[build]
  # Bun-native Docker image — no Dockerfile needed.

[env]
  PORT = "3000"

[http_service]
  internal_port       = 3000
  force_https         = true
  auto_stop_machines  = "stop"   # scale-to-zero when idle
  auto_start_machines = true
  min_machines_running = 0
  processes           = ["app"]

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
