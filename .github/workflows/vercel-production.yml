name: Vercel Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.BUN_AUTH_TOKEN }}

      - name: Build
        run: bun run --cwd packages/web build
        env:
          PUBLIC_NEON_AUTH_URL: ${{ secrets.PUBLIC_NEON_AUTH_URL }}
          PUBLIC_API_URL: ${{ secrets.PUBLIC_API_URL }}
          PUBLIC_GA4_MEASUREMENT_ID: G-NYSM92EDYD
          SITE_URL: https://from-idea-to-customer.vercel.app

      - name: Link Vercel project
        run: |
          mkdir -p packages/web/.vercel
          echo '{"projectId":"${{ secrets.VERCEL_PROJECT_ID }}","orgId":"${{ secrets.VERCEL_ORG_ID }}"}' > packages/web/.vercel/project.json

      - name: Deploy
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: packages/web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
